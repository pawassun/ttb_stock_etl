name: TTB Daily Stock ETL

on:
  schedule:
    # รันทุกวันจันทร์ - ศุกร์ เวลา 17:00 น. (เวลาไทยคือเที่ยงคืน 00:00)
    # 17:00 UTC = 00:00 ICT (Bangkok)
    - cron: '30 15 * * 1-5'
    - cron: '45 15 * * 1-5'
    
  workflow_dispatch: # ปุ่มกดรันเองแบบ Manual สำหรับทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Pipeline
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python ttb_etl_pipeline.py

      # หมายเหตุ: ลบส่วน cat log ออกแล้ว เพราะ logging จะโชว์ในหน้า Actions ให้เลย
