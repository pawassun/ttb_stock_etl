name: TTB Daily ETL Pipeline

on:
  schedule:
    # ตั้งเวลาให้รันทุกวันตอน 19:00 น. เวลาไทย (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch: # ปุ่มสำหรับกดรันเองเพื่อทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: uses/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Script
        env:
          # ดึงค่าจาก Secrets ที่ Sun เพิ่งใส่ไปมาใช้งาน
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python ttb_etl_pipeline.py